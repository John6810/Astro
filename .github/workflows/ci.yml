name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: read

jobs:
  # Stage 1: static checks — type-check, format-check, build.
  static:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Astro type check
        run: pnpm exec astro check

      - name: Format check (Prettier)
        run: pnpm exec prettier --check .

      - name: Build (no deploy)
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-build
          path: dist/
          retention-days: 3

  # Stage 2: unit tests on the Cloudflare Workers runtime via
  # @cloudflare/vitest-pool-workers.
  unit:
    name: Unit tests
    needs: static
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Astro build (needed for dist/ → ASSETS binding)
        run: pnpm build

      - name: Run unit tests
        run: pnpm exec vitest run

  # Stage 3: E2E acceptance suite against the Cloudflare Workers Builds
  # preview deployment. CF posts a Deployment to the GitHub API when a
  # build completes; we poll for it and pass the environment_url to
  # Playwright as PREVIEW_URL.
  #
  # main pushes get the production URL (the same deployment goes to
  # jonathan-aerts.dev once Workers Builds finishes), but for PR branches
  # we get the per-PR preview at <branch>-astro.<account>.workers.dev.
  e2e:
    name: E2E acceptance
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for Cloudflare Workers Builds preview
        id: cf
        uses: actions/github-script@v8
        with:
          script: |
            // Poll the GitHub Deployments API for a CF Workers Builds
            // deployment on this commit. CF Workers Builds posts these
            // automatically. We accept any environment whose name
            // starts with the configured Worker name or contains
            // "preview" / "production" — Workers Builds uses several
            // conventions across plans.
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const sha   = context.payload.pull_request?.head.sha ?? context.sha;

            const deadline = Date.now() + 12 * 60 * 1000; // 12 min hard cap

            while (Date.now() < deadline) {
              const { data: deployments } = await github.rest.repos.listDeployments({
                owner, repo, sha, per_page: 30,
              });

              for (const deployment of deployments) {
                const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                  owner, repo, deployment_id: deployment.id, per_page: 10,
                });
                const latest = statuses[0];
                if (!latest) continue;
                if (latest.state === "success" && latest.environment_url) {
                  core.setOutput("preview_url", latest.environment_url);
                  core.info(`Resolved preview URL: ${latest.environment_url}`);
                  return;
                }
                if (latest.state === "failure" || latest.state === "error") {
                  core.setFailed(
                    `CF Workers Builds deployment ${deployment.id} reported ${latest.state}: ${latest.description ?? ""}`
                  );
                  return;
                }
              }
              core.info("No successful CF deployment yet, sleeping 20s…");
              await new Promise((r) => setTimeout(r, 20_000));
            }
            core.setFailed("Timed out waiting for CF Workers Builds preview");

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Run E2E suite
        env:
          PREVIEW_URL: ${{ steps.cf.outputs.preview_url }}
        run: pnpm exec playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
