name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: read

jobs:
  # Stage 1: static checks — type-check, format-check, build.
  static:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Astro type check
        run: pnpm exec astro check

      - name: Format check (Prettier)
        run: pnpm exec prettier --check .

      - name: Build (no deploy)
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-build
          path: dist/
          retention-days: 3

  # Stage 2: unit tests on the Cloudflare Workers runtime via
  # @cloudflare/vitest-pool-workers.
  unit:
    name: Unit tests
    needs: static
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Astro build (needed for dist/ → ASSETS binding)
        run: pnpm build

      - name: Run unit tests
        run: pnpm exec vitest run

  # Stage 3: E2E acceptance suite against the Cloudflare Workers Builds
  # deployment. We poll the GitHub check-runs API for the CF GitHub App
  # (slug `cloudflare-workers-and-pages`) — that's the only signal CF
  # Workers Builds posts back to GitHub. Unlike the old CF Pages
  # integration it does NOT write to the Deployments API, so polling
  # listDeployments() returns nothing on Worker projects.
  #
  # Once the check-run completes with `success`, we derive PREVIEW_URL
  # from the branch name using CF's deterministic per-branch alias
  # (`preview_urls: true` in wrangler.jsonc enables them):
  #
  #   - PR / non-main push  → https://<slug>-astro.aerts-jonathan.workers.dev
  #   - push to main        → https://jonathan-aerts.dev  (custom domain)
  #
  # The slug is the branch name lowercased with `/` → `-`. CF truncates
  # branch aliases to a maximum length so we mirror that ceiling here.
  e2e:
    name: E2E acceptance
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for Cloudflare Workers Builds check-run
        id: cf
        uses: actions/github-script@v8
        with:
          script: |
            // Resolve the SHA the CF build is keyed on. For
            // `pull_request` events that's the PR head SHA (the merge
            // SHA never gets a CF build). For `push` events it's
            // context.sha directly.
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const sha   = context.payload.pull_request?.head.sha ?? context.sha;

            // CF GitHub App slug. The same app handles both Pages and
            // Workers Builds — the check name carries the distinction
            // ("Workers Builds: <script>" vs "Pages: <project>").
            const CF_APP_SLUG = "cloudflare-workers-and-pages";

            const deadline = Date.now() + 12 * 60 * 1000; // 12 min hard cap

            while (Date.now() < deadline) {
              const { data } = await github.rest.checks.listForRef({
                owner, repo, ref: sha, per_page: 100,
              });
              const cfRun = data.check_runs.find(
                (r) => r.app?.slug === CF_APP_SLUG
              );

              if (cfRun) {
                core.info(
                  `CF check-run ${cfRun.id} (${cfRun.name}): ${cfRun.status} / ${cfRun.conclusion ?? "—"}`
                );
                if (cfRun.status === "completed") {
                  if (cfRun.conclusion === "success") {
                    core.info("CF build succeeded — proceeding to e2e.");
                    return;
                  }
                  core.setFailed(
                    `CF Workers Build concluded ${cfRun.conclusion}. See ${cfRun.details_url}`
                  );
                  return;
                }
              } else {
                core.info("No CF check-run on this SHA yet.");
              }
              await new Promise((r) => setTimeout(r, 20_000));
            }
            core.setFailed("Timed out waiting for CF Workers Builds check-run");

      - name: Derive PREVIEW_URL
        id: url
        run: |
          # PR events: use the head branch. Push events: use ref_name.
          # ${GITHUB_HEAD_REF} is empty for non-PR events.
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          if [ "$BRANCH" = "main" ]; then
            URL="https://jonathan-aerts.dev"
          else
            # CF branch-alias slug: lowercase, `/` → `-`, strip other
            # non-alphanumeric chars (CF replaces them with `-` too).
            # Capped at 28 chars — CF truncates longer slugs.
            SLUG=$(printf '%s' "$BRANCH" \
              | tr '[:upper:]' '[:lower:]' \
              | tr '/' '-' \
              | sed 's/[^a-z0-9-]/-/g' \
              | cut -c1-28 \
              | sed 's/-*$//')
            URL="https://${SLUG}-astro.aerts-jonathan.workers.dev"
          fi
          echo "Resolved PREVIEW_URL: $URL"
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Wait for preview to respond
        env:
          PREVIEW_URL: ${{ steps.url.outputs.preview_url }}
        run: |
          # The check-run completing means the deploy API returned 200,
          # but the edge can lag a few seconds before the URL is
          # routable. Retry up to 60s before giving up.
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Accept-Language: en-US" "$PREVIEW_URL/" || echo "000")
            echo "[$((i*5))s] $PREVIEW_URL/ → HTTP $code"
            case "$code" in
              200|301|302|404) exit 0 ;;
            esac
            sleep 5
          done
          echo "::error::Preview URL never became reachable"
          exit 1

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Run E2E suite
        env:
          PREVIEW_URL: ${{ steps.url.outputs.preview_url }}
        run: pnpm exec playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
